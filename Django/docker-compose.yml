services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: encurtador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "6060:6060"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: encurtador
      DB_USER: postgres
      DB_PASS: postgres
      HTTP_PORT: "6060"
      HTTP_BASE: /api/
      USER: user
      PASS: pass123
    depends_on:
      db:
        condition: service_healthy
